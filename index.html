<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BubasTube</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .p-box { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }
        .search-zone { display: flex; gap: 10px; width: 100%; max-width: 850px; margin-bottom: 20px; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 25px; outline: none; }
        button { background: #ff0000; color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; width: 100%; max-width: 1000px; }
        .v-card { cursor: pointer; }
        .v-card img { width: 100%; border-radius: 8px; border: 1px solid #222; transition: 0.2s; }
        .v-card img:hover { border-color: #ff0000; transform: scale(1.03); }
        h3 { align-self: flex-start; width: 100%; max-width: 850px; color: #444; font-size: 12px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body onload="init()">
    <div class="p-box"><iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
    <div class="search-zone">
        <input type="text" id="query" placeholder="Поиск (Clash Royale, Танки...)">
        <button onclick="handleAction()">ПУСК</button>
    </div>
    <div id="results" class="grid"></div>
    <h3>ИСТОРИЯ</h3>
    <div id="video-grid" class="grid"></div>
<script>
    let db;
    const player = document.getElementById('main-player');
    function init() {
        const config = {
            apiKey: "AIzaSyCMgd0KOSCfyJ0RWk3qhpk6eMOnKPhLNbA",
            authDomain: "bubaschat.firebaseapp.com",
            databaseURL: "https://bubaschat-default-rtdb.firebaseio.com",
            projectId: "bubaschat",
            storageBucket: "bubaschat.firebasestorage.app",
            messagingSenderId: "360805253305",
            appId: "1:360805253305:web:6f5ed2c212a44833e7db68"
        };
        firebase.initializeApp(config);
        db = firebase.database();
        db.ref('tubevideos').limitToLast(12).on('value', (s) => {
            const g = document.getElementById('video-grid');
            g.innerHTML = "";
            let data = s.val();
            if (data) Object.values(data).reverse().forEach(v => renderCard(v.id, g, false));
        });
    }
    function handleAction() {
        let q = document.getElementById('query').value;
        if (!q) return;
        let id = "";
        if (q.includes("v=")) id = q.split("v=")[1].split("&")[0];
        else if (q.includes("youtu.be/")) id = q.split("youtu.be/")[1].split("?")[0];
        if (id) { play(id); db.ref('tubevideos').push({ id: id }); document.getElementById('query').value = ""; }
        else { search(q); }
    }
    async function search(q) {
        const res = document.getElementById('results');
        res.innerHTML = "...";
        try {
            const r = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(q)}&filter=videos`);
            const d = await r.json();
            res.innerHTML = "";
            d.streams.forEach(v => { let vidId = v.url.split("v=")[1]; renderCard(vidId, res, true); });
        } catch (e) { res.innerHTML = ""; }
    }
    function play(id) {
        player.src = `https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1&rel=0`;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
    function renderCard(id, container, save) {
        let div = document.createElement('div');
        div.className = 'v-card';
        div.onclick = () => { play(id); if (save) db.ref('tubevideos').push({ id: id }); };
        div.innerHTML = `<img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">`;
        container.appendChild(div);
    }
</script>
</body>
</html>
