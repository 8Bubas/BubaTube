<!DOCTYPE html>
<html>
<head>

    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .p-box { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }
        .up-zone { display: flex; gap: 10px; width: 100%; max-width: 850px; margin-bottom: 30px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 20px; outline: none; padding-left: 15px; }
        button { background: #ff0000; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; width: 100%; max-width: 1000px; }
        .grid img { width: 100%; border-radius: 10px; cursor: pointer; transition: 0.2s; border: 1px solid #222; }
        .grid img:hover { transform: scale(1.05); border-color: #ff0000; }
    </style>
</head>
