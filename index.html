<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BubasTube</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .p-box { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }
        .search-zone { display: flex; gap: 10px; width: 100%; max-width: 850px; margin-bottom: 20px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #444; color: white; padding: 12px; border-radius: 25px; outline: none; padding-left: 15px; }
        button { background: #ff0000; color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        h3 { align-self: flex-start; width: 100%; max-width: 850px; margin: 15px 0 10px 0; color: #aaa; font-size: 14px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; width: 100%; max-width: 1000px; margin-bottom: 30px; }
        .v-card { cursor: pointer; transition: 0.2s; }
        .v-card img { width: 100%; border-radius: 8px; border: 1px solid #222; }
        .v-card p { font-size: 11px; margin: 5px 0; height: 30px; overflow: hidden; color: #ccc; }
    </style>
</head>
<body onload="init()">
    <div class="p-box"><iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
    <div class="search-zone">
        <input type="text" id="query" placeholder="Поиск...">
        <button onclick="searchVid()">НАЙТИ</button>
    </div>
    <h3>Результаты:</h3>
    <div id="search-results" class="grid"></div>
    <h3>История:</h3>
    <div id="video-grid" class="grid"></div>
<script>
    let db;
    const player = document.getElementById('main-player');
    const proxy = "https://yewtu.be"; 
    function init() {
        const firebaseConfig = {
            apiKey: "AIzaSyCMgd0KOSCfyJ0RWk3qhpk6eMOnKPhLNbA",
            authDomain: "bubaschat.firebaseapp.com",
            databaseURL: "https://bubaschat-default-rtdb.firebaseio.com",
            projectId: "bubaschat",
            storageBucket: "bubaschat.firebasestorage.app",
            messagingSenderId: "360805253305",
            appId: "1:360805253305:web:6f5ed2c212a44833e7db68"
        };
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        db.ref('tubevideos').limitToLast(20).on('value', (s) => {
            const g = document.getElementById('video-grid');
            g.innerHTML = "";
            let data = s.val();
            if (data) {
                Object.values(data).reverse().forEach(v => {
                    renderCard(v.id, v.title || "", g, false);
                });
            }
        });
    }
    async function searchVid() {
        let q = document.getElementById('query').value;
        if (!q) return;
        const resDiv = document.getElementById('search-results');
        resDiv.innerHTML = "<p>...</p>";
        try {
            const response = await fetch(proxy + "/api/v1/search?q=" + encodeURIComponent(q));
            const results = await response.json();
            resDiv.innerHTML = "";
            results.forEach(v => {
                if (v.type === "video") renderCard(v.videoId, v.title, resDiv, true);
            });
        } catch (e) {
            resDiv.innerHTML = "<p>Ошибка</p>";
        }
    }
    function renderCard(id, title, container, isSearch) {
        let div = document.createElement('div');
        div.className = 'v-card';
        div.onclick = () => {
            player.src = proxy + "/embed/" + id + "?autoplay=1";
            if (isSearch) db.ref('tubevideos').push({ id: id, title: title });
            window.scrollTo({top: 0, behavior: 'smooth'});
        };
        div.innerHTML = '<img src="' + proxy + '/vi/' + id + '/mqdefault.jpg"><p>' + title + '</p>';
        container.appendChild(div);
    }
</script>
</body>
</html>
