<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BubasTube Chaos Gaming</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .p-box { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #111; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #222; box-shadow: 0 0 30px rgba(255,0,0,0.3); }
        iframe { width: 100%; height: 100%; border: none; }
        .controls { display: flex; gap: 20px; }
        .btn { background: #ff0000; color: white; border: none; padding: 20px 50px; border-radius: 15px; font-size: 35px; cursor: pointer; font-weight: bold; box-shadow: 0 6px #900; text-transform: uppercase; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px #900; }
        .btn-back { background: #333; box-shadow: 0 6px #111; }
        #status { font-size: 16px; color: #ff0000; margin-bottom: 10px; font-weight: bold; text-align: center; height: 24px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="status">ГОТОВ К КАТКЕ? ЖМИ →</div>
    <div class="p-box">
        <iframe id="player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    
    <div class="controls">
        <button class="btn btn-back" onclick="goBack()">←</button>
        <button class="btn" onclick="nextVideo()">→</button>
    </div>

<script>
    const player = document.getElementById('player');
    const status = document.getElementById('status');
    let history = [];
    let pos = -1;

    // ГИГАНТСКИЙ СПИСОК ТЕМ: ИГРЫ, ТЕХНИКА, ТРЭШ
    const myTopics = [
        // ИГРЫ (новое)
        "CS2 ace highlights", "FNAF funny moments", "Minecraft survival 100 days", "Rust base raid", "DayZ epic encounters",
        "GTA 5 Thug Life", "Garry's Mod chaos", "Elden Ring boss fight", "Horror game jumpscares", "Mortal Kombat fatalities",
        "Brawl Stars legendary pulls", "Clash of Clans clan war", "Roblox horror stories", "Mobile Legends savage",
        // ЭКСТРИМ И ТЕХНИКА
        "T-90 Tank modern warfare", "KV-2 one shot compilation", "War Thunder jet dogfight", "Su-57 Felon maneuver",
        "Hydraulic press destruction", "High speed police chase POV", "Drift competition Japan", "Offroad 4x4 fail",
        // ТРЭШ И ЮМОР
        "Best pranks 2026", "Try not to laugh hard", "Webcam fails", "Stupid inventions", "Meme compilation 2026",
        // МОРЕ (твоё)
        "Huge storm vs cargo ship", "Modern aircraft carrier operation", "Odessa port drone view", "Submarine combat mission"
    ];

    async function nextVideo() {
        status.innerText = "ГЕНЕРИРУЕМ ХАОС...";
        
        const randomTopic = myTopics[Math.floor(Math.random() * myTopics.length)];
        const q = `${randomTopic} ${Math.floor(Math.random() * 50)}`;
        
        try {
            const r = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(q)}&filter=videos`);
            const d = await r.json();
            
            if (d.streams && d.streams.length > 0) {
                // Выбираем любое из первых 20 результатов для максимума рандома
                const v = d.streams[Math.floor(Math.random() * Math.min(d.streams.length, 20))];
                const id = v.url.split("v=")[1];
                
                history.push({id: id, title: v.title});
                pos = history.length - 1;
                play(id);
                status.innerText = "СЕЙЧАС: " + v.title.substring(0, 35).toUpperCase() + "...";
            } else {
                nextVideo();
            }
        } catch (e) {
            status.innerText = "ШЛЮЗ ТОРМОЗИТ, ЖМИ ЕЩЕ!";
        }
    }

    function play(id) {
        player.src = `https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1&rel=0&iv_load_policy=3`;
    }

    function goBack() {
        if (pos > 0) {
            pos--;
            let v = history[pos];
            play(v.id);
            status.innerText = "ИСТОРИЯ: " + v.title.substring(0, 30);
        }
    }
</script>
</body>
</html>
