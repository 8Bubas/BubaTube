<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BubasTube Ultra</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .p-box { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #111; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }
        .search-zone { display: flex; gap: 8px; width: 100%; max-width: 850px; margin-bottom: 10px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 20px; outline: none; }
        button { background: #ff0000; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .s-list { width: 100%; max-width: 850px; display: flex; flex-direction: column; gap: 5px; margin-bottom: 20px; }
        .s-item { background: #111; padding: 12px; border-radius: 10px; border: 1px solid #222; cursor: pointer; font-size: 14px; color: #ccc; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; width: 100%; max-width: 850px; }
        .v-card { cursor: pointer; text-align: center; }
        .v-card img { width: 100%; border-radius: 8px; border: 1px solid #222; }
        h3 { align-self: flex-start; width: 100%; max-width: 850px; color: #444; font-size: 11px; margin: 10px auto; text-transform: uppercase; }
    </style>
</head>
<body onload="init()">
    <div class="p-box"><iframe id="main-player" src="" allowfullscreen></iframe></div>
    <div class="search-zone">
        <input type="text" id="query" placeholder="Танки, Рояль..." oninput="getTips(this.value)">
        <button onclick="handleAction()">ПУСК</button>
    </div>
    <div id="results" class="s-list"></div>
    <h3>История</h3>
    <div id="history" class="grid"></div>

<script>
    let db;
    const player = document.getElementById('main-player');
    const apiPiped = "https://pipedapi.kavin.rocks"; // Основной сервер
    const apiAlt = "https://api.piped.victr.me";   // Запасной

    function init() {
        const config = {
            apiKey: "AIzaSyCMgd0KOSCfyJ0RWk3qhpk6eMOnKPhLNbA",
            authDomain: "bubaschat.firebaseapp.com",
            databaseURL: "https://bubaschat-default-rtdb.firebaseio.com",
            projectId: "bubaschat",
            storageBucket: "bubaschat.firebasestorage.app",
            messagingSenderId: "360805253305",
            appId: "1:360805253305:web:6f5ed2c212a44833e7db68"
        };
        firebase.initializeApp(config);
        db = firebase.database();
        db.ref('tubevideos').limitToLast(4).on('value', (s) => {
            const h = document.getElementById('history');
            h.innerHTML = "";
            let data = s.val();
            if (data) Object.values(data).reverse().forEach(v => renderCard(v.id, h));
        });
    }

    function getTips(q) {
        if (q.length < 2) { document.getElementById('results').innerHTML = ""; return; }
        const s = document.createElement('script');
        window.ytCallback = (data) => {
            const res = document.getElementById('results');
            res.innerHTML = "";
            data[1].slice(0, 6).forEach(item => {
                let div = document.createElement('div');
                div.className = 's-item';
                div.innerText = "▶ " + item[0];
                div.onclick = () => fastPlay(item[0]);
                res.appendChild(div);
            });
        };
        s.src = `https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=${encodeURIComponent(q)}&callback=ytCallback`;
        document.body.appendChild(s);
    }

    async function fastPlay(q) {
        document.getElementById('results').innerHTML = "Ищем...";
        try {
            const r = await fetch(`${apiPiped}/search?q=${encodeURIComponent(q)}&filter=videos`);
            const d = await r.json();
            if (d.streams && d.streams[0]) {
                const id = d.streams[0].url.split("v=")[1];
                play(id);
            }
        } catch (e) {
            // Если первый сервер упал, пробуем запасной
            try {
                const r = await fetch(`${apiAlt}/search?q=${encodeURIComponent(q)}&filter=videos`);
                const d = await r.json();
                if (d.streams && d.streams[0]) {
                    const id = d.streams[0].url.split("v=")[1];
                    play(id);
                }
            } catch (err) { alert("Сервера заняты, попробуй прямую ссылку"); }
        }
    }

    function handleAction() {
        let q = document.getElementById('query').value;
        let id = (q.includes("v=")) ? q.split("v=")[1].split("&")[0] : (q.includes("youtu.be/")) ? q.split("youtu.be/")[1].split("?")[0] : "";
        if (id) play(id); else fastPlay(q);
    }

    function play(id) {
        // Используем Piped плеер - он без кнопок и рекламы
        player.src = `https://piped.video/embed/${id}?autoplay=1`;
        db.ref('tubevideos').push({ id: id });
        document.getElementById('results').innerHTML = "";
    }

    function renderCard(id, container) {
        let div = document.createElement('div');
        div.className = 'v-card';
        div.onclick = () => play(id);
        div.innerHTML = `<img src="https://i.ytimg.com/vi/${id}/mqdefault.jpg">`;
        container.appendChild(div);
    }
</script>
</body>
</html>
