<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BubasTube Stealth</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .p-box { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #1a1a1a; }
        /* Чистый плеер без мусора */
        video { width: 100%; height: 100%; outline: none; }
        .search-zone { display: flex; gap: 8px; width: 100%; max-width: 850px; margin-bottom: 20px; }
        input { flex: 1; background: #111; border: 1px solid #222; color: white; padding: 12px; border-radius: 20px; outline: none; }
        button { background: #ff0000; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; width: 100%; max-width: 850px; margin-bottom: 20px; }
        .v-card { cursor: pointer; text-align: center; }
        .v-card img { width: 100%; border-radius: 8px; border: 1px solid #1a1a1a; }
        .v-card p { font-size: 10px; color: #777; margin: 5px 0; height: 24px; overflow: hidden; }
        h3 { align-self: flex-start; width: 100%; max-width: 850px; color: #333; font-size: 11px; margin: 10px auto; text-transform: uppercase; }
    </style>
</head>
<body onload="init()">
    <div class="p-box">
        <video id="bubas-player" controls autoplay poster="https://i.ytimg.com/vi/dQw4w9WgXcQ/maxresdefault.jpg"></video>
    </div>
    <div class="search-zone">
        <input type="text" id="query" placeholder="Танки, Рояль или ссылка...">
        <button onclick="handleAction()">ПУСК</button>
    </div>
    <div id="results" class="grid"></div>
    <h3 id="rec-h" style="display:none">Похожие видео</h3>
    <div id="recs" class="grid"></div>
    <h3>История</h3>
    <div id="history" class="grid"></div>

<script>
    let db;
    const vPlayer = document.getElementById('bubas-player');
    const searchApi = "https://invidious.ducks.party"; // Живое зеркало для поиска

    function init() {
        const config = {
            apiKey: "AIzaSyCMgd0KOSCfyJ0RWk3qhpk6eMOnKPhLNbA",
            authDomain: "bubaschat.firebaseapp.com",
            databaseURL: "https://bubaschat-default-rtdb.firebaseio.com",
            projectId: "bubaschat",
            storageBucket: "bubaschat.firebasestorage.app",
            messagingSenderId: "360805253305",
            appId: "1:360805253305:web:6f5ed2c212a44833e7db68"
        };
        firebase.initializeApp(config);
        db = firebase.database();
        db.ref('tubevideos').limitToLast(6).on('value', (s) => {
            const h = document.getElementById('history');
            h.innerHTML = "";
            let data = s.val();
            if (data) Object.values(data).reverse().forEach(v => renderCard(v.id, v.title, h));
        });
    }

    function handleAction() {
        let q = document.getElementById('query').value;
        if (!q) return;
        let id = (q.includes("v=")) ? q.split("v=")[1].split("&")[0] : (q.includes("youtu.be/")) ? q.split("youtu.be/")[1].split("?")[0] : "";
        if (id) { play(id, "Видео"); } else { search(q); }
    }

    async function search(q) {
        const res = document.getElementById('results');
        res.innerHTML = "...";
        try {
            const r = await fetch(`${searchApi}/api/v1/search?q=${encodeURIComponent(q)}&type=video`);
            const d = await r.json();
            res.innerHTML = "";
            d.slice(0, 5).forEach(v => renderCard(v.videoId, v.title, res));
        } catch (e) { res.innerHTML = "Ошибка поиска. Используй ссылку."; }
    }

    async function loadRecs(id) {
        const rDiv = document.getElementById('recs');
        document.getElementById('rec-h').style.display = "block";
        try {
            const r = await fetch(`${searchApi}/api/v1/videos/${id}`);
            const d = await r.json();
            rDiv.innerHTML = "";
            d.recommendedVideos.slice(0, 3).forEach(v => renderCard(v.videoId, v.title, rDiv));
        } catch (e) { }
    }

    function play(id, title) {
        // Магия: подгружаем видео через альтернативный источник
        vPlayer.src = `https://invidious.ducks.party/latest_version?id=${id}&itag=22`;
        vPlayer.poster = `https://i.ytimg.com/vi/${id}/maxresdefault.jpg`;
        db.ref('tubevideos').push({ id: id, title: title });
        loadRecs(id);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function renderCard(id, title, container) {
        let div = document.createElement('div');
        div.className = 'v-card';
        div.onclick = () => play(id, title);
        div.innerHTML = `<img src="https://i.ytimg.com/vi/${id}/mqdefault.jpg"><p>${title || ''}</p>`;
        container.appendChild(div);
    }
</script>
</body>
</html>
