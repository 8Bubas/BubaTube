<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BubasTube</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .p-box { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        iframe { width: 100%; height: 100%; border: none; }
        .up-zone { display: flex; gap: 10px; width: 100%; max-width: 850px; margin-bottom: 30px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 20px; outline: none; }
        button { background: #ff0000; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; width: 100%; }
        .v-card img { width: 100%; border-radius: 10px; cursor: pointer; }
        #auth { margin-top: 100px; text-align: center; }
    </style>
</head>
<body>

    <div id="auth">
        <input type="password" id="pass" placeholder="Пароль...">
        <button onclick="check()">ВХОД</button>
    </div>

    <div id="content" style="display:none; width: 100%; flex-direction: column; align-items: center;">
        <div class="p-box">
            <iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="up-zone">
            <input type="text" id="v_url" placeholder="Ссылка сюда...">
            <button onclick="uploadVid()">ПУСК</button>
        </div>
        <div id="video-grid" class="grid"></div>
    </div>

<script>
    function check() {
        let p = document.getElementById('pass').value;
        if (p == "123") {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('content').style.display = 'flex';
            init();
        }
    }

    function init() {
        const firebaseConfig = {
            apiKey: "AIzaSyCMgd0KOSCfyJ0RWk3qhpk6eMOnKPhLNbA",
            authDomain: "bubaschat.firebaseapp.com",
            databaseURL: "https://bubaschat-default-rtdb.firebaseio.com",
            projectId: "bubaschat",
            storageBucket: "bubaschat.firebasestorage.app",
            messagingSenderId: "360805253305",
            appId: "1:360805253305:web:6f5ed2c212a44833e7db68"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const player = document.getElementById('main-player');

        window.uploadVid = function() {
            let u = document.getElementById('v_url').value;
            let id = "";
            if (u.includes("v=")) id = u.split("v=")[1].split("&")[0];
            else if (u.includes("youtu.be/")) id = u.split("youtu.be/")[1].split("?")[0];
            if (id) {
                db.ref('tubevideos').push({ id: id });
                play(id);
            }
        };

        window.play = function(id) {
            player.src = "https://www.youtube.com/embed/" + id + "?autoplay=1&modestbranding=1";
        };

        db.ref('tubevideos').on('value', (s) => {
            const g = document.getElementById('video-grid');
            g.innerHTML = "";
            let data = s.val();
            if (data) {
                Object.values(data).reverse().forEach(v => {
                    let img = document.createElement('img');
                    img.src = "https://img.youtube.com/vi/" + v.id + "/mqdefault.jpg";
                    img.style.width = "100%";
                    img.style.borderRadius = "10px";
                    img.style.cursor = "pointer";
                    img.onclick = () => play(v.id);
                    g.appendChild(img);
                });
            }
        });
    }
</script>
</body>
</html>
