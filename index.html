<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BubasTube Random</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .p-box { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #111; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .controls { display: flex; gap: 20px; align-items: center; margin-bottom: 20px; }
        .nav-btn { background: #333; color: white; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-size: 24px; font-weight: bold; transition: 0.3s; }
        .nav-btn:hover { background: #ff0000; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .info { text-align: center; margin-bottom: 10px; color: #aaa; font-size: 14px; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 20px; width: 250px; outline: none; margin-bottom: 20px; }
    </style>
</head>
<body onload="init()">

    <div id="video-title" class="info">Нажми → чтобы начать просмотр</div>
    
    <div class="p-box">
        <iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    
    <div class="controls">
        <button id="prev-btn" class="nav-btn" onclick="goBack()" disabled>←</button>
        <button class="nav-btn" onclick="nextVideo()">→</button>
    </div>

    <input type="text" id="manual-url" placeholder="Или вставь свою ссылку..." onchange="handleManual()">

<script>
    let db;
    const player = document.getElementById('main-player');
    
    // ТВОЯ БАЗА ВИДЕО (добавляй сюда ID через запятую)
    const playlist = [
        {id: 'p77_v0pGf_Y', title: 'Танки: Эпичные моменты'},
        {id: '2I_8jS-p28Y', title: 'История брони'},
        {id: '5tzWGjB0ZFU', title: 'Clash Royale: Лучшие деки'},
        {id: 'kJQP7kiw5Fk', title: 'Музыка для каток'},
        {id: 'dQw4w9WgXcQ', title: 'Секретное видео'}
    ];

    let history = [];
    let currentIndex = -1;

    function init() {
        const config = {
            apiKey: "AIzaSyCMgd0KOSCfyJ0RWk3qhpk6eMOnKPhLNbA",
            authDomain: "bubaschat.firebaseapp.com",
            databaseURL: "https://bubaschat-default-rtdb.firebaseio.com",
            projectId: "bubaschat",
            storageBucket: "bubaschat.firebasestorage.app",
            messagingSenderId: "360805253305",
            appId: "1:360805253305:web:6f5ed2c212a44833e7db68"
        };
        firebase.initializeApp(config);
        db = firebase.database();
    }

    function nextVideo() {
        // Выбираем случайное видео, которое не совпадает с текущим
        let randomVid;
        do {
            randomVid = playlist[Math.floor(Math.random() * playlist.length)];
        } while (history.length > 0 && randomVid.id === history[currentIndex]);

        history.push(randomVid.id);
        currentIndex = history.length - 1;
        
        play(randomVid.id, randomVid.title);
        updateButtons();
    }

    function goBack() {
        if (currentIndex > 0) {
            currentIndex--;
            const prevId = history[currentIndex];
            play(prevId, "Предыдущее из истории");
            updateButtons();
        }
    }

    function play(id, title) {
        player.src = `https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1`;
        document.getElementById('video-title').innerText = title;
        // Сохраняем в твою общую историю Firebase
        db.ref('tubevideos').push({ id: id, title: title });
    }

    function updateButtons() {
        document.getElementById('prev-btn').disabled = (currentIndex <= 0);
    }

    function handleManual() {
        let q = document.getElementById('manual-url').value;
        let id = q.includes("v=") ? q.split("v=")[1].split("&")[0] : q.includes("youtu.be/") ? q.split("youtu.be/")[1].split("?")[0] : "";
        if (id) {
            play(id, "Видео по ссылке");
            history.push(id);
            currentIndex = history.length - 1;
            updateButtons();
            document.getElementById('manual-url').value = "";
        }
    }
</script>
</body>
</html>
