<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BubasTube TV</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .p-box { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #111; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .controls { display: flex; gap: 20px; margin-bottom: 20px; }
        .btn { background: #ff0000; color: white; border: none; padding: 20px 40px; border-radius: 15px; font-size: 30px; cursor: pointer; box-shadow: 0 4px #990000; }
        .btn:active { box-shadow: 0 2px #990000; transform: translateY(2px); }
        .btn-back { background: #333; box-shadow: 0 4px #111; }

        .title-card { background: #111; padding: 10px 20px; border-radius: 10px; border-left: 5px solid #ff0000; width: 100%; max-width: 850px; margin-bottom: 10px; }
        #v-name { font-weight: bold; color: #fff; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 20px; width: 300px; text-align: center; }
    </style>
</head>
<body onload="init()">

    <div class="title-card">
        <span id="v-name">Нажми ВПЕРЕД для запуска...</span>
    </div>
    
    <div class="p-box">
        <iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    
    <div class="controls">
        <button class="btn btn-back" onclick="goBack()">←</button>
        <button class="btn" onclick="nextVideo()">→</button>
    </div>

    <input type="text" id="manual" placeholder="Вставь ссылку сюда..." onchange="handleUrl()">

<script>
    let db;
    const player = document.getElementById('main-player');
    
    // ТВОЙ ЛИЧНЫЙ СПИСОК (Никаких Рикроллов!)
    const playlist = [
        {id: 'p77_v0pGf_Y', title: 'ОБЗОР ТАНКА ТИГР'},
        {id: '2I_8jS-p28Y', title: 'КАК СТРЕЛЯЕТ КВ-2'},
        {id: '5tzWGjB0ZFU', title: 'CLASH ROYALE: ТОП ДЕКИ'},
        {id: 'kJQP7kiw5Fk', title: 'ФОНК ДЛЯ ИГРЫ'},
        {id: '8v_4m6_2Y9E', title: 'ТАНКОВЫЕ ПРИКОЛЫ'},
        {id: 'aq3n6hps_xk', title: 'ДЕФ В КЛЭШ РОЯЛЬ'}
    ];

    let history = [];
    let pos = -1;

    function init() {
        const config = {
            apiKey: "AIzaSyCMgd0KOSCfyJ0RWk3qhpk6eMOnKPhLNbA",
            authDomain: "bubaschat.firebaseapp.com",
            databaseURL: "https://bubaschat-default-rtdb.firebaseio.com",
            projectId: "bubaschat",
            storageBucket: "bubaschat.firebasestorage.app",
            messagingSenderId: "360805253305",
            appId: "1:360805253305:web:6f5ed2c212a44833e7db68"
        };
        firebase.initializeApp(config);
        db = firebase.database();
    }

    function nextVideo() {
        let v = playlist[Math.floor(Math.random() * playlist.length)];
        history.push(v);
        pos = history.length - 1;
        play(v.id, v.title);
    }

    function goBack() {
        if (pos > 0) {
            pos--;
            let v = history[pos];
            play(v.id, v.title);
        }
    }

    function play(id, title) {
        player.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
        document.getElementById('v-name').innerText = title;
        db.ref('tubevideos').push({ id: id, title: title, time: Date.now() });
    }

    function handleUrl() {
        let q = document.getElementById('manual').value;
        let id = q.includes("v=") ? q.split("v=")[1].split("&")[0] : q.includes("youtu.be/") ? q.split("youtu.be/")[1].split("?")[0] : "";
        if (id) {
            play(id, "ВИДЕО ПО ТВОЕЙ ССЫЛКЕ");
            history.push({id: id, title: "ТВОЯ ССЫЛКА"});
            pos = history.length - 1;
            document.getElementById('manual').value = "";
        }
    }
</script>
</body>
</html>
