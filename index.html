<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BubasTube</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .p-box { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #111; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }
        .search-zone { display: flex; gap: 8px; width: 100%; max-width: 850px; margin-bottom: 20px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 20px; outline: none; }
        button { background: #ff0000; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; width: 100%; max-width: 850px; margin-bottom: 20px; }
        .v-card { cursor: pointer; text-align: center; }
        .v-card img { width: 100%; border-radius: 8px; border: 1px solid #333; display: block; }
        .v-card p { font-size: 10px; color: #aaa; margin: 5px 0; height: 24px; overflow: hidden; }
        h3 { align-self: flex-start; width: 100%; max-width: 850px; color: #555; font-size: 11px; margin: 10px auto; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body onload="init()">
    <div class="p-box"><iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>
    <div class="search-zone">
        <input type="text" id="query" placeholder="Поиск (танки, рояль...) или ссылка">
        <button onclick="handleAction()">ПУСК</button>
    </div>

    <div id="results" class="grid"></div>
    
    <h3 id="rec-title" style="display:none;">РЕКОМЕНДАЦИИ</h3>
    <div id="recommendations" class="grid"></div>

    <h3>ИСТОРИЯ</h3>
    <div id="history" class="grid"></div>

<script>
    let db;
    const player = document.getElementById('main-player');
    const api = "https://pipedapi.kavin.rocks"; // Пробуем этот, если ляжет - дам замену

    function init() {
        const config = {
            apiKey: "AIzaSyCMgd0KOSCfyJ0RWk3qhpk6eMOnKPhLNbA",
            authDomain: "bubaschat.firebaseapp.com",
            databaseURL: "https://bubaschat-default-rtdb.firebaseio.com",
            projectId: "bubaschat",
            storageBucket: "bubaschat.firebasestorage.app",
            messagingSenderId: "360805253305",
            appId: "1:360805253305:web:6f5ed2c212a44833e7db68"
        };
        firebase.initializeApp(config);
        db = firebase.database();
        db.ref('tubevideos').limitToLast(6).on('value', (s) => {
            const h = document.getElementById('history');
            h.innerHTML = "";
            let data = s.val();
            if (data) Object.values(data).reverse().forEach(v => renderCard(v.id, v.title, h, false));
        });
    }

    function handleAction() {
        let q = document.getElementById('query').value;
        if (!q) return;
        let id = "";
        if (q.includes("v=")) id = q.split("v=")[1].split("&")[0];
        else if (q.includes("youtu.be/")) id = q.split("youtu.be/")[1].split("?")[0];
        
        if (id) {
            play(id, "Видео");
        } else {
            search(q);
        }
    }

    async function search(q) {
        const res = document.getElementById('results');
        res.innerHTML = "Ищем...";
        try {
            const r = await fetch(`${api}/search?q=${encodeURIComponent(q)}&filter=videos`);
            const d = await r.json();
            res.innerHTML = "";
            d.streams.slice(0, 6).forEach(v => {
                let vidId = v.url.split("v=")[1];
                renderCard(vidId, v.title, res, true);
            });
        } catch (e) { res.innerHTML = "Сервер поиска занят. Используй ссылку."; }
    }

    async function loadRecs(id) {
        const recDiv = document.getElementById('recommendations');
        document.getElementById('rec-title').style.display = "block";
        recDiv.innerHTML = "...";
        try {
            const r = await fetch(`${api}/streams/${id}`);
            const d = await r.json();
            recDiv.innerHTML = "";
            d.relatedStreams.slice(0, 6).forEach(v => {
                let vidId = v.url.split("v=")[1];
                renderCard(vidId, v.title, recDiv, true);
            });
        } catch (e) { recDiv.innerHTML = ""; }
    }

    function play(id, title) {
        // Убрали всё лишнее из плеера, чтобы не уводил на Ютуб
        player.src = `https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3`;
        db.ref('tubevideos').push({ id: id, title: title });
        loadRecs(id);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function renderCard(id, title, container, isNew) {
        let div = document.createElement('div');
        div.className = 'v-card';
        div.onclick = () => play(id, title);
        // Картинки берем через прокси-ссылку, чтобы точно грузились
        div.innerHTML = `<img src="https://img.youtube.com/vi/${id}/mqdefault.jpg"><p>${title || ''}</p>`;
        container.appendChild(div);
    }
</script>
</body>
</html>
