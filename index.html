<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BubasTube Ultra</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .p-box { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #111; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #222; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* БРОНЯ ТОЛЬКО НА ВЫХОДЫ */
        .shield-t { position: absolute; top: 0; left: 0; width: 50%; height: 60px; z-index: 10; }
        .shield-yt { position: absolute; bottom: 0; right: 0; width: 150px; height: 50px; z-index: 10; }

        .search-zone { display: flex; gap: 8px; width: 100%; max-width: 850px; margin-bottom: 20px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 20px; outline: none; }
        button { background: #ff0000; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        .grid { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; max-width: 850px; justify-content: center; }
        .v-btn { background: #111; border: 1px solid #333; color: #ccc; padding: 8px 15px; border-radius: 15px; font-size: 12px; cursor: pointer; }
        
        h3 { align-self: flex-start; width: 100%; max-width: 850px; color: #444; font-size: 11px; margin: 15px auto 5px auto; text-transform: uppercase; }
    </style>
</head>
<body onload="init()">
    <div class="p-box">
        <div class="shield-t"></div>
        <div class="shield-yt"></div>
        <iframe id="main-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    
    <div class="search-zone">
        <input type="text" id="query" placeholder="Танки, Рояль или ссылка...">
        <button onclick="handleAction()">ПУСК</button>
    </div>

    <div id="results" class="grid"></div>

    <h3>История</h3>
    <div id="history" class="grid"></div>

<script>
    let db;
    const player = document.getElementById('main-player');

    function init() {
        const config = {
            apiKey: "AIzaSyCMgd0KOSCfyJ0RWk3qhpk6eMOnKPhLNbA",
            authDomain: "bubaschat.firebaseapp.com",
            databaseURL: "https://bubaschat-default-rtdb.firebaseio.com",
            projectId: "bubaschat",
            storageBucket: "bubaschat.firebasestorage.app",
            messagingSenderId: "360805253305",
            appId: "1:360805253305:web:6f5ed2c212a44833e7db68"
        };
        firebase.initializeApp(config);
        db = firebase.database();
        db.ref('tubevideos').limitToLast(10).on('value', (s) => {
            const h = document.getElementById('history');
            h.innerHTML = "";
            let data = s.val();
            if (data) {
                Object.entries(data).reverse().forEach(([key, v]) => {
                    let btn = document.createElement('button');
                    btn.className = 'v-btn';
                    btn.innerText = v.title || "Видео";
                    btn.onclick = () => play(v.id, v.title);
                    h.appendChild(btn);
                });
            }
        });
    }

    function handleAction() {
        let q = document.getElementById('query').value;
        if (!q) return;
        let id = (q.includes("v=")) ? q.split("v=")[1].split("&")[0] : (q.includes("youtu.be/")) ? q.split("youtu.be/")[1].split("?")[0] : "";
        if (id) { 
            play(id, "Видео по ссылке"); 
            document.getElementById('query').value = "";
        } else { 
            search(q); 
        }
    }

    function search(q) {
        const res = document.getElementById('results');
        res.innerHTML = "";
        const s = document.createElement('script');
        window.googleCallback = (data) => {
            data[1].slice(0, 5).forEach(item => {
                let btn = document.createElement('button');
                btn.className = 'v-btn';
                btn.innerText = item[0];
                btn.onclick = () => {
                    // При клике на поиск просто открываем выдачу в новом окне для выбора
                    window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(item[0])}`, '_blank');
                };
                res.appendChild(btn);
            });
        };
        s.src = `https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=${encodeURIComponent(q)}&callback=googleCallback`;
        document.body.appendChild(s);
    }

    function play(id, title) {
        // rel=1 включает рекомендации в конце ролика
        player.src = `https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1&rel=1&iv_load_policy=1&controls=1`;
        db.ref('tubevideos').push({ id: id, title: title });
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
</script>
</body>
</html>
