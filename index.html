<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Картинка Тест</title>
    <style>
        body {
            background-color: #000; /* Черный фон */
            margin: 0;
            display: flex;
            justify-content: center; /* Центр по горизонту */
            align-items: center;    /* Центр по вертикали */
            height: 100vh;          /* Высота на весь экран */
        }
        img {
            max-width: 90%;         /* Чтобы не вылезала за края */
            border-radius: 15px;    /* Скруглим углы для красоты */
            border: 2px solid #333; /* Тонкая рамка */
        }
    </style>
</head>
<body>

    <img src="https://ru.wikipedia.org/wiki/%D0%A4%D0%B0%D0%B9%D0%BB:George_Floyd.png" alt="Test Image">

</body>
</html>
